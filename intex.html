<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasmin - Portfolio</title>
    <link rel="stylesheet" href="https://use.typekit.net/dcc4pra.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-short">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-transparent">
        <div class="container-fluid px-4 px-lg-5">
            <a href="intex.html" class="navbar-brand logo">
                <img src="assets/logo.svg" alt="Maxim" class="logo-image">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                <ul class="navbar-nav gap-4">
                    <li class="nav-item"><a class="nav-link" href="works.html">Works</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About me</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <div class="hero-image-wrapper" id="heroMediaWrapper">
                <img src="assets/Yasmin_starPhoto.png" alt="Yasmin" class="hero-image" id="heroImage">
                <video
                    src="assets/Yasmin_starVideo.mp4"
                    class="hero-video"
                    id="heroVideo"
                    autoplay
                    muted
                    loop
                    playsinline
                ></video>
            </div>
            <img src="assets/Yasmin.png" alt="Yasmin" class="hero-title">
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container-fluid px-4 px-lg-5 footer-inner">
            <div class="footer-left">Yasmin Gendelevich  2026</div>
            <div class="footer-right">Portfolio</div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const wrapper = document.getElementById('heroMediaWrapper');
        const img     = document.getElementById('heroImage');
        const video   = document.getElementById('heroVideo');

        // Hover swap only on desktop — mobile shows video by default via CSS
        if (window.matchMedia('(min-width: 992px)').matches) {
            wrapper.addEventListener('mouseenter', () => {
                img.style.display   = 'none';
                video.style.display = 'block';
                video.play();
            });

            wrapper.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime   = 0;
                video.style.display = 'none';
                img.style.display   = 'block';
            });
        }
    </script>
</body>
</html>
